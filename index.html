<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sao Cristalix</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#090a0c;--card:#111318;--line:#1e222b;--fg:#e8eaef;--dim:#6b7280;
      --s:#22d3ee;--m:#fb7185;--l:#fbbf24;--a:#818cf8;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.35;min-height:100vh;-webkit-tap-highlight-color:transparent}
    .w{max-width:440px;margin:0 auto;padding:10px 12px 48px}
    .hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    .hd h1{font-size:15px;font-weight:800;letter-spacing:-0.02em}
    .hd h1 b{color:var(--a);font-weight:800}
    .sync{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px}
    .dot{width:5px;height:5px;border-radius:50%;background:var(--dim)}
    .dot.on{background:#4ade80}
    .dot.err{background:#f87171}
    .blk{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);border-radius:10px;padding:12px;font-size:12px;color:var(--dim);display:none}
    .blk.on{display:block}
    .blk strong{color:var(--fg);display:block;margin-bottom:4px;font-size:13px}
    #root{display:none}
    #root.on{display:block}
    .tabs{display:flex;flex-wrap:wrap;gap:4px;margin:0 0 8px}
    .tab{border:1px solid var(--line);background:var(--card);color:var(--fg);padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
    .tab.on{border-color:var(--a);background:rgba(129,140,248,0.12)}
    .sec{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:8px}
    .sec-t{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    @media(max-width:380px){.row2{grid-template-columns:1fr}}
    .dg{display:flex;gap:8px;align-items:center;padding:6px 8px;background:#0c0e12;border-radius:8px;border:1px solid var(--line)}
    .dg img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#08090b;flex-shrink:0}
    .dg-m{min-width:0;flex:1}
    .dg-n{font-size:11px;font-weight:700;line-height:1.2}
    .dg-t{font-variant-numeric:tabular-nums;font-size:12px;font-weight:800;color:var(--a);margin-top:2px}
    .muted{color:var(--dim);font-size:10px;font-variant-numeric:tabular-nums}
    .rst{font-variant-numeric:tabular-nums;font-size:12px;font-weight:700}
    .snd{display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px}
    .sw{width:38px;height:20px;border-radius:999px;background:#0c0e12;border:1px solid var(--line);position:relative;cursor:pointer;flex-shrink:0}
    .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--dim);transition:transform .15s}
    .sw.on{border-color:var(--a);background:rgba(129,140,248,0.15)}
    .sw.on::after{transform:translateX(18px);background:var(--a)}
    .fld{display:flex;align-items:center;gap:6px;flex:1;min-width:120px}
    .lbl{font-size:10px;color:var(--dim);width:52px;flex-shrink:0}
    .sl{-webkit-appearance:none;flex:1;height:3px;border-radius:2px;background:var(--line);outline:none}
    .sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--a);cursor:pointer}
    select{background:#0c0e12;border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:4px 6px;font-size:11px;max-width:160px}
    .ev{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ev-imgs{display:flex;gap:5px}
    .ev-imgs img{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer;background:#08090b}
    .ev-now{flex:1;min-width:0;font-size:11px}
    .ev-now b{display:block;font-size:12px}
    .btn2{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:#0c0e12;font-size:11px;font-weight:700;cursor:pointer;color:var(--fg)}
    .drp{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);align-items:flex-start}
    .drp:last-child{border-bottom:0;padding-bottom:0}
    .drp:first-child{padding-top:0}
    .rd{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .rd.s{background:var(--s)}.rd.m{background:var(--m)}.rd.l{background:var(--l)}.rd.u{background:#64748b}
    .dn{font-weight:700;font-size:12px;line-height:1.25}
    .dm{font-size:10px;color:var(--dim);margin-top:2px;font-variant-numeric:tabular-nums}
    .foot{display:flex;gap:6px;margin-top:8px}
    .btn{flex:1;border:1px solid var(--line);background:var(--card);color:var(--fg);padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
    .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(72px);background:var(--card);border:1px solid var(--line);padding:8px 12px;border-radius:8px;font-size:11px;z-index:80;transition:transform .2s;max-width:90vw}
    .toast.v{transform:translateX(-50%) translateY(0)}
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;padding:14px;z-index:90}
    .ov.v{display:flex}
    .bx{background:var(--card);border:1px solid var(--line);border-radius:12px;width:100%;max-width:380px;max-height:82vh;overflow:hidden;display:flex;flex-direction:column}
    .bx-h{padding:10px 12px;border-bottom:1px solid var(--line);font-weight:800;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .bx-x{border:0;background:transparent;color:var(--dim);font-size:18px;line-height:1;cursor:pointer;padding:0 4px}
    .bx-b{padding:12px;overflow-y:auto;font-size:12px;line-height:1.5;white-space:pre-wrap;color:var(--fg)}
    .bx-l{padding:8px 10px;overflow-y:auto;flex:1}
    .hi{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:11px}
    .hi:last-child{border-bottom:0}
    .hi span:last-child{color:var(--dim);font-variant-numeric:tabular-nums;white-space:nowrap;font-size:10px}
  </style>
</head>
<body>
  <div class="w">
    <div class="hd">
      <h1>SAO<b>·</b>CRISTALIX</h1>
      <div class="sync"><span class="dot" id="sd"></span><span id="st">—</span></div>
    </div>
    <div class="blk" id="blk"><strong>Нет доступа</strong></div>
    <div id="root">
      <div class="tabs" id="tabs"></div>
      <div class="sec"><div class="sec-t">Рестарт</div><div class="rst" id="rs">—</div></div>
      <div class="sec">
        <div class="sec-t">Подземелья</div>
        <div class="row2" id="dgs"></div>
      </div>
      <div class="sec">
        <div class="sec-t">Звук до врат</div>
        <div class="snd">
          <div class="sw" id="sw"></div>
          <div class="fld"><span class="lbl">Тип</span><select id="so"></select></div>
          <div class="fld"><span class="lbl">Громк.</span><input class="sl" id="vl" type="range" min="1" max="100" value="70" /><span class="muted" id="vlt" style="width:26px;text-align:right">70</span></div>
          <div class="fld"><span class="lbl">За, с</span><input class="sl" id="nt" type="range" min="20" max="120" step="5" value="60" /><span class="muted" id="ntl" style="width:34px;text-align:right">60</span></div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-t">Ивент</div>
        <div class="ev">
          <div class="ev-imgs" id="eimg"></div>
          <div class="ev-now" id="enow"></div>
          <button type="button" class="btn2" id="bh">История</button>
        </div>
      </div>
      <div class="sec">
        <div class="sec-t">Дропы</div>
        <div id="dr"></div>
      </div>
      <div class="foot"><button type="button" class="btn" id="rf">Обновить</button></div>
    </div>
  </div>
  <div class="toast" id="to"></div>
  <div class="ov" id="m1"><div class="bx"><div class="bx-h"><span id="m1t"></span><button type="button" class="bx-x" id="m1x">×</button></div><div class="bx-b" id="m1b"></div></div></div>
  <div class="ov" id="m2"><div class="bx"><div class="bx-h"><span>Ивенты · 12ч</span><button type="button" class="bx-x" id="m2x">×</button></div><div class="bx-l" id="m2l"></div></div></div>
  <script>
    const tg=window.Telegram?.WebApp;
    if(tg){tg.expand();tg.setHeaderColor("#090a0c");tg.setBackgroundColor("#090a0c");tg.ready();}
    const KU="sao_u",KA="sao_a",KS="sao_s",KV="sao_v",KY="sao_y",KN="sao_n";
    function uid(){
      const w=window.Telegram?.WebApp;
      if(!w){try{return parseInt(localStorage.getItem(KU)||"0",10)||0;}catch(e){return 0;}}
      const a=w.initDataUnsafe?.user?.id;
      if(a){try{localStorage.setItem(KU,String(a));}catch(e){}return a;}
      try{const r=w.initData;if(r){const p=new URLSearchParams(r),u=p.get("user");if(u){const j=JSON.parse(u);if(j?.id){try{localStorage.setItem(KU,String(j.id));}catch(e){}return j.id;}}}}catch(e){}
      try{return parseInt(localStorage.getItem(KU)||"0",10)||0;}catch(e){return 0;}
    }
    function api(){
      const u=new URL(location.href),q=u.searchParams.get("api"),c=v=>String(v||"").replace(/\/+$/,"");
      return c(q)||c(localStorage.getItem(KA))||"";
    }
    const API=api();
    try{if(API)localStorage.setItem(KA,API);}catch(e){}
    const EM={
      corruption:{t:"Коррупция",i:"t1",x:"— Меньше денег с мобов\n— Дороже кейсы"},
      solar:{t:"Солнечный взрыв",i:"t2",x:"— Мощность: n×1.4\n— Мобы +30% HP; шанс леги/мифа/секретных мечей +30%\n— Кейсы питомцев +30% цена; шанс леги/мифа/секр. +30%\n— Секретные мечи и петы Тьмы"},
      blood_moon:{t:"Кровавая луна",i:"t3",x:"— Быстрее спавн мобов\n— Эксклюзивные враги с «Волшебная шахта»\n— Зачарованные мечи с убийств\n— Эксклюзивные мобы на локациях"},
      darkness:{t:"Тьма",i:"t4",x:"— Эксклюзивные враги с «Зачарованный лес»\n— Секретное оружие\n— Зачарованные петы и мечи"}
    };
    const SO=[["crystal","Кристалл"],["forest","Лес"],["pulse","Пульс"],["chime","Колокол"],["harp","Арфа"],["water","Капли"],["bell","Колокол 2"],["glass","Стекло"],["soft","Тихо"],["piano","Пиано"]];
    let se=localStorage.getItem(KS)!=="0",sv=(parseInt(localStorage.getItem(KV)||"70",10)||70)/100,st=localStorage.getItem(KY)||"crystal",ns=Math.max(20,Math.min(120,parseInt(localStorage.getItem(KN)||"60",10)||60));
    let stt=null,an="",au=null,sd=new Set();
    function iu(n){return new URL("imgs/"+n+".png",location.href).toString();}
    function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
    function rc(r){return r==="secret"?"s":r==="mythic"?"m":r==="legendary"?"l":"u";}
    function rl(r){return r==="secret"?"Секрет":r==="mythic"?"Миф":r==="legendary"?"Лега":"—";}
    function kl(k){return({pet:"Пет",relic:"Релик",weapon:"Оруж",aura:"Аура",unknown:"—"})[k]||"—";}
    function fd(s){s=Math.max(0,Math.floor(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h?h+"ч"+String(m).padStart(2,"0")+"м":m?m+"м"+String(x).padStart(2,"0")+"с":x+"с";}
    function fc(t){return new Date(t*1000).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
    function ac(){if(!au)au=new(window.AudioContext||window.webkitAudioContext)();return au;}
    function ps(){
      try{
        const c=ac(),v=sv,n=c.currentTime;
        function o(ty,f,a,d,p,f2){const z=c.createOscillator(),g=c.createGain();z.connect(g);g.connect(c.destination);z.type=ty;z.frequency.value=f;g.gain.setValueAtTime(0,n+a);g.gain.linearRampToValueAtTime(p*v,n+a+0.04);g.gain.setValueAtTime(p*v,n+a+d-f2);g.gain.exponentialRampToValueAtTime(1e-4,n+a+d);z.start(n+a);z.stop(n+a+d);}
        const t=st;
        if(t==="crystal")[[523,0],[659,0.3],[784,0.6],[1047,0.9],[1319,1.2]].forEach(([f,s])=>{o("sine",f,s,0.7,0.3,0.55);o("sine",f*2,s,0.35,0.05,0.25);});
        else if(t==="forest")[[330,0],[440,0.28],[554,0.56],[660,0.84],[880,1.12]].forEach(([f,s])=>{o("sine",f,s,0.8,0.22,0.6);o("triangle",f*1.5,s,0.45,0.04,0.35);});
        else if(t==="pulse")for(let i=0;i<6;i++){o("sine",220+i*40,i*0.28,0.22,0.18,0.15);o("sine",440+i*80,i*0.28,0.18,0.07,0.12);}
        else if(t==="chime")[[392,0],[494,0.22],[587,0.44],[784,0.66],[988,0.88],[1175,1.1],[988,1.4]].forEach(([f,s])=>o("sine",f,s,0.65,0.2,0.5));
        else if(t==="harp")[[294,0],[370,0.18],[440,0.36],[587,0.54],[740,0.72],[880,0.9],[1109,1.1],[880,1.38]].forEach(([f,s])=>{o("sine",f,s,0.75,0.18,0.55);o("triangle",f*1.5,s,0.38,0.04,0.28);});
        else if(t==="water")[[800,0],[1000,0.1],[1200,0.2],[900,0.5],[1100,0.6],[1300,0.7],[1050,1.05],[1250,1.15]].forEach(([f,s])=>o("sine",f,s,0.22,0.16,0.18));
        else if(t==="bell")[[220,0],[440,0.05],[880,0.1],[1760,0.15]].forEach(([f,s])=>{o("sine",f,s,1.7,0.28,1.3);o("sine",f*2.756,s,1.1,0.05,0.75);});
        else if(t==="glass")[[659,0],[830,0.3],[1047,0.6],[1319,0.9],[1047,1.25],[830,1.6]].forEach(([f,s])=>{o("sine",f,s,0.6,0.18,0.45);o("sine",f*1.8,s,0.3,0.03,0.22);});
        else if(t==="soft")[[329,0],[415,0.38],[493,0.76],[554,1.14],[659,1.52]].forEach(([f,s])=>{o("sine",f,s,0.85,0.14,0.65);o("sine",f*1.007,s,0.85,0.06,0.65);});
        else if(t==="piano")[[262,0],[330,0.22],[392,0.44],[523,0.66],[659,0.88],[784,1.1],[659,1.38]].forEach(([f,s])=>{o("triangle",f,s,0.85,0.25,0.65);o("sine",f*2,s,0.45,0.04,0.35);});
      }catch(e){}
    }
    function toast(m){const e=document.getElementById("to");e.textContent=m;e.classList.add("v");setTimeout(()=>e.classList.remove("v"),1600);}
    function m1o(t,x){document.getElementById("m1t").textContent=t;document.getElementById("m1b").textContent=x;document.getElementById("m1").classList.add("v");}
    function m1c(){document.getElementById("m1").classList.remove("v");}
    function m2o(){
      const L=document.getElementById("m2l"),h=stt?.event_history_12h||[];
      L.innerHTML="";
      if(!h.length){L.innerHTML='<div class="muted">Пусто</div>';document.getElementById("m2").classList.add("v");return;}
      h.forEach(r=>{
        const d=document.createElement("div");d.className="hi";
        const e=r.ended_ts?" → "+fc(r.ended_ts):"";
        d.innerHTML="<span>"+esc(r.label||r.id||"")+"</span><span>"+fc(r.since_ts)+e+"</span>";
        L.appendChild(d);
      });
      document.getElementById("m2").classList.add("v");
    }
    function m2c(){document.getElementById("m2").classList.remove("v");}
    document.getElementById("m1x").onclick=m1c;
    document.getElementById("m1").onclick=function(e){if(e.target.id==="m1")m1c();};
    document.getElementById("m2x").onclick=m2c;
    document.getElementById("m2").onclick=function(e){if(e.target.id==="m2")m2c();};
    document.getElementById("bh").onclick=m2o;
    const so=document.getElementById("so");
    SO.forEach(([v,t])=>{const o=document.createElement("option");o.value=v;o.textContent=t;so.appendChild(o);});
    so.value=st;
    document.getElementById("sw").classList.toggle("on",se);
    document.getElementById("vl").value=Math.round(sv*100);
    document.getElementById("vlt").textContent=String(Math.round(sv*100));
    document.getElementById("nt").value=ns;
    document.getElementById("ntl").textContent=String(ns);
    document.getElementById("sw").onclick=function(){
      se=!se;localStorage.setItem(KS,String(se));this.classList.toggle("on",se);toast(se?"Звук вкл":"Звук выкл");
      if(se)try{ac().resume().then(ps);}catch(e){}
    };
    document.getElementById("vl").oninput=function(){sv=parseInt(this.value,10)/100;document.getElementById("vlt").textContent=this.value;localStorage.setItem(KV,this.value);};
    so.onchange=function(){st=this.value;localStorage.setItem(KY,st);if(se)try{ac().resume().then(ps);}catch(e){}};
    document.getElementById("nt").oninput=function(){ns=parseInt(this.value,10);document.getElementById("ntl").textContent=String(ns);localStorage.setItem(KN,String(ns));sd.clear();};
    async function pns(){const u=uid();if(!u||!API)return;try{await fetch(API+"/notify-seconds",{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"1"},body:JSON.stringify({user_id:u,notify_seconds:ns})});}catch(e){}}
    document.getElementById("nt").onchange=pns;
    function rtabs(){
      const t=document.getElementById("tabs"),n=stt?.tracked_nicks||[];
      t.innerHTML="";
      if(!n.length){t.innerHTML='<span class="muted">Нет ников в конфиге</span>';an="";return;}
      if(!an||!n.includes(an))an=n[0];
      n.forEach(x=>{
        const b=document.createElement("button");b.type="button";b.className="tab"+(x===an?" on":"");b.textContent=x;
        b.onclick=function(){an=x;rtabs();rdrp();};
        t.appendChild(b);
      });
    }
    function rdgs(){
      const g=document.getElementById("dgs");g.innerHTML="";
      if(!stt)return;
      (stt.dungeons||[]).forEach(d=>{
        const e=document.createElement("div");e.className="dg";e.innerHTML='<img alt="" src="'+iu(d.img)+'" /><div class="dg-m"><div class="dg-n">'+esc(d.title)+'</div><div class="dg-t" id="cd-'+d.key+'">—</div></div>';
        g.appendChild(e);
      });
    }
    function rev(){
      const im=document.getElementById("eimg"),nw=document.getElementById("enow");
      im.innerHTML="";
      Object.entries(EM).forEach(([k,v])=>{
        const x=document.createElement("img");x.src=iu(v.i);x.alt=v.t;
        x.onclick=function(){m1o(v.t,v.x);};
        im.appendChild(x);
      });
      const c=stt?.current_event;
      if(c&&c.label){nw.innerHTML="<b>"+esc(c.label)+"</b><span class=\"muted\">"+fc(c.since_ts)+"</span>";}
      else{nw.innerHTML='<span class="muted">Нет активного</span>';}
    }
    function rdrp(){
      const h=document.getElementById("dr");h.innerHTML="";
      if(!stt||!an){h.innerHTML='<span class="muted">—</span>';return;}
      const a=(stt.drops&&stt.drops[an])?stt.drops[an]:[];
      if(!a.length){h.innerHTML='<span class="muted">Пусто</span>';return;}
      a.forEach(d=>{
        const e=document.createElement("div");e.className="drp";
        e.innerHTML='<div class="rd '+rc(d.rarity)+'"></div><div><div class="dn">'+esc(d.item||"")+'</div><div class="dm">'+rl(d.rarity)+" · "+kl(d.kind)+" · "+fc(d.ts)+"</div></div>";
        h.appendChild(e);
      });
    }
    function nx(d,nw){
      const t=d.next_open_ts;
      if(t&&t>nw+2)return t;
      return nw+20;
    }
    function tk(){
      if(!stt)return;
      const nw=Date.now()/1000,r=stt.next_restart_msk_ts;
      if(r)document.getElementById("rs").textContent=fd(r-nw);
      (stt.dungeons||[]).forEach(d=>{
        const el=document.getElementById("cd-"+d.key);if(!el)return;
        const t=nx(d,nw),rm=Math.max(0,t-nw);
        el.textContent=fd(rm)+" · "+fc(t);
        if(se&&rm<=ns&&rm>ns-5){
          const k=d.key+":"+Math.floor(t);
          if(!sd.has(k)){sd.add(k);try{ac().resume().then(ps);}catch(e){}tg?.HapticFeedback?.notificationOccurred("warning");}
        }
        if(rm>ns+5)[...sd].forEach(x=>{if(x.startsWith(d.key+":"))sd.delete(x);});
      });
    }
    async function ld(s){
      const u=uid();
      if(!API){document.getElementById("sd").className="dot err";document.getElementById("st").textContent="Нет API";return;}
      if(!s){document.getElementById("sd").className="dot";document.getElementById("st").textContent="…";}
      try{
        const r=await fetch(API+"/state?uid="+encodeURIComponent(u)+"&t="+Date.now(),{cache:"no-store",headers:{"ngrok-skip-browser-warning":"1"}});
        if(r.status===403){document.getElementById("blk").classList.add("on");document.getElementById("root").classList.remove("on");document.getElementById("sd").className="dot err";document.getElementById("st").textContent="403";return;}
        if(!r.ok)throw new Error(String(r.status));
        stt=await r.json();
        document.getElementById("blk").classList.remove("on");document.getElementById("root").classList.add("on");
        if(typeof stt.notify_seconds==="number"){ns=Math.max(20,Math.min(120,Math.floor(stt.notify_seconds)));document.getElementById("nt").value=ns;document.getElementById("ntl").textContent=String(ns);localStorage.setItem(KN,String(ns));}
        rtabs();rdgs();rev();rdrp();tk();
        document.getElementById("sd").className="dot on";document.getElementById("st").textContent="ок";
      }catch(e){
        document.getElementById("sd").className="dot err";document.getElementById("st").textContent="off";
        if(!s)toast("API");
      }
    }
    document.getElementById("rf").onclick=function(){ld(false);};
    document.addEventListener("click",function(){try{ac().resume();}catch(e){}},{once:true});
    document.getElementById("sw").classList.toggle("on",se);
    ld(false);
    setInterval(function(){ld(true);},5000);
    setInterval(tk,1000);
  </script>
</body>
